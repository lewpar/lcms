# Generated by LCMS — do not edit manually.
# Update via CMS Settings (gear icon on the site selector page).

# ── Static generated sites ────────────────────────────────────────────────────
# Each site is served at https://your-domain.com/<site-slug>/
server {
    listen 80;
    server_name your-domain.com;

    root /home/lewis/lcms/output;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\. {
        deny all;
    }
}

# ── CMS application ───────────────────────────────────────────────────────────
server {
    listen 80;
    server_name cms.your-domain.com;

    client_max_body_size 64m;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }
}
