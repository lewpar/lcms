<script>(function(){
  var stored=null;try{stored=localStorage.getItem('lcms-theme')}catch(e){}
  var isDark=stored?stored==='dark':false;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  document.addEventListener('DOMContentLoaded',function(){
    var btn=document.getElementById('darkModeBtn');
    if(!btn)return;
    btn.textContent=isDark?'☀':'☽';
    btn.addEventListener('click',function(){
      var current=document.documentElement.getAttribute('data-theme');
      var next=current==='dark'?'light':'dark';
      document.documentElement.setAttribute('data-theme',next);
      btn.textContent=next==='dark'?'☀':'☽';
      try{localStorage.setItem('lcms-theme',next)}catch(e){}
    });
  });
})();</script>
<script>(function(){document.addEventListener('click',function(e){var a=e.target.closest('.heading-anchor');if(!a)return;e.preventDefault();var url=location.href.split('#')[0]+a.getAttribute('href');navigator.clipboard.writeText(url).then(function(){var t=a.textContent;a.textContent='✓';a.classList.add('copied');setTimeout(function(){a.textContent=t;a.classList.remove('copied')},1500)}).catch(function(){});});})();</script>
